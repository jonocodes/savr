## Environment Variables ---------------------------------------------
##  ... available for use in the activated environment
##      as well as [hook], [profile] scripts and [services] below.
## -------------------------------------------------------------------
[vars]
JONO_FLOX="yes!"
PLAYWRIGHT_SKIP_VALIDATE_HOST_REQUIREMENTS="true"

#PLAYWRIGHT_BROWSERS_PATH=$(nix build --print-out-paths nixpkgs#playwright.browsers)

# INTRO_MESSAGE = "It's gettin' Flox in here"


## Activation Hook ---------------------------------------------------
##  ... run by _bash_ shell when you run 'flox activate'.
## -------------------------------------------------------------------
[hook]
on-activate = """
  # Autogenerated by Flox

  # Install nodejs dependencies
  npm install

  # End autogenerated by Flox

  # Extract PLAYWRIGHT_BROWSERS_PATH from the playwright-test nix wrapper.
  # This makes the flox env self-contained — no dependency on home-manager session vars.
  _pw_wrapper="$(which playwright 2>/dev/null)"
  if [ -n "$_pw_wrapper" ] && [ -f "$_pw_wrapper" ]; then
    _pw_browsers="$(grep 'PLAYWRIGHT_BROWSERS_PATH' "$_pw_wrapper" | sed "s/.*'\\(.*\\)'.*/\\1/")"
    if [ -n "$_pw_browsers" ] && [ -d "$_pw_browsers" ]; then
      export PLAYWRIGHT_BROWSERS_PATH="$_pw_browsers"
    fi
  fi
"""


## Profile script ----------------------------------------------------
## ... sourced by _your shell_ when you run 'flox activate'.
## -------------------------------------------------------------------
[profile]
common = '''

'''

